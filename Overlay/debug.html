<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat vs Streamer — Debug Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;700&display=swap');

  :root {
    --dark:    #0a0a0f;
    --surface: #111118;
    --card:    #161621;
    --border:  #1e1e2e;
    --text:    #e0e0f0;
    --muted:   #555577;
    --purple:  #9146ff;
    --cyan:    #00f2ea;
    --red:     #ff2d55;
    --green:   #3ddc84;
    --gold:    #ffd700;
    --orange:  #ff9500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 320px 1fr 280px;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #fff 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.connected    { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.disconnected { background: var(--red); }

  .status-label {
    font-size: 13px;
    color: var(--muted);
  }

  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover { border-color: var(--purple); color: var(--text); }
  button.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── Left panel: live stats ── */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
  }

  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-value.green  { color: var(--green); }
  .stat-value.purple { color: var(--purple); }
  .stat-value.gold   { color: var(--gold); }
  .stat-value.cyan   { color: var(--cyan); }
  .stat-value.red    { color: var(--red); }

  .leaderboard {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    flex-shrink: 0;
  }

  .lb-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .lb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { color: var(--muted); width: 20px; font-family: 'DM Mono', monospace; }
  .lb-name { flex: 1; padding: 0 8px; }
  .lb-pts  { color: var(--gold); font-family: 'DM Mono', monospace; font-weight: 700; }

  /* ── Center panel: event log ── */
  .panel-center {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .log-header .panel-title { padding: 0; border: none; }

  .filter-bar {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .filter-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  .filter-btn.active { border-color: var(--purple); color: var(--text); background: rgba(145,70,255,0.1); }

  .log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    display: flex;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    animation: fadeIn 0.2s ease;
    align-items: flex-start;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-entry.twitch  { background: rgba(145,70,255,0.06); border-color: rgba(145,70,255,0.15); }
  .log-entry.tiktok  { background: rgba(255,45,85,0.06);  border-color: rgba(255,45,85,0.12); }
  .log-entry.system  { background: rgba(61,220,132,0.05); border-color: rgba(61,220,132,0.1); }
  .log-entry.sabotage { background: rgba(255,107,53,0.07); border-color: rgba(255,107,53,0.15); }
  .log-entry.raid    { background: rgba(255,215,0,0.06);  border-color: rgba(255,215,0,0.15); }

  .log-time  { color: var(--muted); flex-shrink: 0; font-size: 11px; margin-top: 1px; }
  .log-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .badge-twitch  { background: rgba(145,70,255,0.2); color: var(--purple); }
  .badge-tiktok  { background: rgba(255,45,85,0.2);  color: var(--red); }
  .badge-system  { background: rgba(61,220,132,0.15); color: var(--green); }
  .badge-sabotage { background: rgba(255,107,53,0.2); color: var(--orange); }
  .badge-raid    { background: rgba(255,215,0,0.15);  color: var(--gold); }
  .badge-chat    { background: rgba(0,242,234,0.12);  color: var(--cyan); }

  .log-body { flex: 1; color: var(--text); line-height: 1.4; }
  .log-body .user { color: var(--purple); }
  .log-body .tiktok-user { color: var(--red); }
  .log-body .pts  { color: var(--gold); }
  .log-body .cmd  { color: var(--green); }

  /* ── Right panel: inject test events ── */
  .panel-right {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .inject-form {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .inject-section {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  input, select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--purple); }

  .inject-btn {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .inject-btn.twitch { background: rgba(145,70,255,0.15); color: var(--purple); border-color: rgba(145,70,255,0.3); }
  .inject-btn.twitch:hover { background: rgba(145,70,255,0.25); }
  .inject-btn.tiktok { background: rgba(255,45,85,0.12); color: var(--red); border-color: rgba(255,45,85,0.25); }
  .inject-btn.tiktok:hover { background: rgba(255,45,85,0.22); }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">Chat vs Streamer — Debug</div>
  <div class="status-dot" id="dot"></div>
  <div class="status-label" id="status-label">Connecting...</div>
  <div class="topbar-actions">
    <button onclick="clearLog()">Clear Log</button>
    <button class="danger" onclick="togglePause()" id="pause-btn">Pause</button>
  </div>
</div>

<!-- Left: stats -->
<div class="panel-left">
  <div class="panel-title">Live Stats</div>
  <div class="stat-list">
    <div class="stat-row"><span class="stat-label">Twitch</span><span class="stat-value green" id="s-twitch">—</span></div>
    <div class="stat-row"><span class="stat-label">TikTok</span><span class="stat-value red" id="s-tiktok">—</span></div>
    <div class="stat-row"><span class="stat-label">Events Today</span><span class="stat-value purple" id="s-events">0</span></div>
    <div class="stat-row"><span class="stat-label">Sabotages Fired</span><span class="stat-value orange" id="s-sabotages">0</span></div>
    <div class="stat-row"><span class="stat-label">Points Awarded</span><span class="stat-value gold" id="s-points">0</span></div>
    <div class="stat-row"><span class="stat-label">Active Viewers</span><span class="stat-value cyan" id="s-viewers">0</span></div>
    <div class="stat-row"><span class="stat-label">Double Points</span><span class="stat-value" id="s-double">Off</span></div>
    <div class="stat-row"><span class="stat-label">Halved Costs</span><span class="stat-value" id="s-halved">Off</span></div>
  </div>
  <div class="leaderboard">
    <div class="lb-title">Top Saboteurs</div>
    <div id="leaderboard">
      <div class="lb-row"><span class="lb-rank">—</span><span class="lb-name" style="color:var(--muted)">Waiting for data...</span></div>
    </div>
  </div>
</div>

<!-- Center: event log -->
<div class="panel-center">
  <div class="log-header">
    <div class="panel-title">Event Log</div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('twitch', this)">Twitch</button>
      <button class="filter-btn" onclick="setFilter('tiktok', this)">TikTok</button>
      <button class="filter-btn" onclick="setFilter('sabotage', this)">Sabotage</button>
      <button class="filter-btn" onclick="setFilter('raid', this)">Raid</button>
    </div>
  </div>
  <div class="log" id="log"></div>
</div>

<!-- Right: inject -->
<div class="panel-right">
  <div class="panel-title">Inject Test Events</div>
  <div class="inject-form">

    <div class="inject-section">Twitch Raid</div>
    <input id="raid-user" placeholder="Raider username" value="testraid">
    <input id="raid-count" placeholder="Viewer count" value="5" type="number" min="1" max="500">
    <div class="row-2">
      <button class="inject-btn twitch" onclick="injectRaid(5)">5 viewers</button>
      <button class="inject-btn twitch" onclick="injectRaid(15)">15 viewers</button>
    </div>
    <div class="row-2">
      <button class="inject-btn twitch" onclick="injectRaid(20)">20 viewers</button>
      <button class="inject-btn twitch" onclick="injectRaid(50)">50 viewers</button>
    </div>
    <button class="inject-btn twitch" onclick="injectRaidCustom()">Custom Raid</button>

    <div class="inject-section">Twitch Chat</div>
    <input id="tw-user" placeholder="Username" value="testviewer">
    <input id="tw-msg"  placeholder="Message"  value="!buy rain">
    <button class="inject-btn twitch" onclick="injectTwitchChat()">Send Chat</button>

    <div class="inject-section">TikTok Events</div>
    <input id="tt-user" placeholder="Username" value="testviewer">
    <div class="row-2">
      <button class="inject-btn tiktok" onclick="injectTT('chat')">Chat</button>
      <button class="inject-btn tiktok" onclick="injectTT('follow')">Follow</button>
    </div>
    <div class="row-2">
      <button class="inject-btn tiktok" onclick="injectTT('like')">Like</button>
      <button class="inject-btn tiktok" onclick="injectTT('share')">Share</button>
    </div>
    <button class="inject-btn tiktok" onclick="injectTT('subscribe')">Subscribe</button>

    <div class="inject-section">TikTok Gift</div>
    <input id="tt-gift-name"     placeholder="Gift name"    value="Rose">
    <input id="tt-gift-diamonds" placeholder="Diamonds"     value="1" type="number">
    <button class="inject-btn tiktok" onclick="injectGift()">Send Gift</button>

    <div class="inject-section">Quick Gifts</div>
    <div class="row-2">
      <button class="inject-btn tiktok" onclick="quickGift('Heart Me', 1)">💖 Heart Me</button>
      <button class="inject-btn tiktok" onclick="quickGift('Rose', 1)">🌹 Rose</button>
    </div>
    <div class="row-2">
      <button class="inject-btn tiktok" onclick="quickGift('Ice Cream', 15)">🍦 Ice Cream</button>
      <button class="inject-btn tiktok" onclick="quickGift('Fireworks', 88)">💣 Fireworks</button>
    </div>
    <div class="row-2">
      <button class="inject-btn tiktok" onclick="quickGift('Mystery Box', 250)">📦 Mystery</button>
      <button class="inject-btn tiktok" onclick="quickGift('TikTok Universe', 17150)">⚡ Universe</button>
    </div>

  </div>
</div>

<script>
  const PORT = new URLSearchParams(location.search).get('port') || '7373';

  // State
  let ws, ttWs;
  let paused = false;
  let activeFilter = 'all';
  let entries = [];
  let stats = { events: 0, sabotages: 0, points: 0 };

  // ── Main WebSocket (overlay) ──────────────────────────────────────────────
  function connect() {
    ws = new WebSocket(`ws://localhost:${PORT}/`);
    ws.onopen  = () => setStatus(true);
    ws.onclose = () => { setStatus(false); setTimeout(connect, 3000); };
    ws.onmessage = e => {
      try { handleOverlay(JSON.parse(e.data)); } catch(_) {}
    };
  }

  // ── TikTok test WebSocket ─────────────────────────────────────────────────
  function connectTT() {
    ttWs = new WebSocket(`ws://localhost:${PORT}/tiktok-test`);
    ttWs.onclose = () => setTimeout(connectTT, 3000);
  }

  function handleOverlay(msg) {
    switch (msg.type) {
      case 'init':
        updateStats(msg);
        updateLeaderboard(msg.leaderboard || []);
        addEntry('system', 'system', '✅ Connected to mod overlay server');
        break;
      case 'feed':
        stats.sabotages++;
        stats.events++;
        document.getElementById('s-sabotages').textContent = stats.sabotages;
        document.getElementById('s-events').textContent = stats.events;
        addEntry('sabotage', 'sabotage',
          `<span class="user">${esc(msg.username)}</span> → <span class="cmd">${esc(msg.sabotageName)}</span> — ${esc(msg.description)}`);
        break;
      case 'leaderboard':
        updateLeaderboard(msg.leaderboard || []);
        break;
      case 'chat':
        stats.events++;
        document.getElementById('s-events').textContent = stats.events;
        const cls = msg.platform === 'tiktok' ? 'tiktok' : 'twitch';
        const userCls = msg.platform === 'tiktok' ? 'tiktok-user' : 'user';
        addEntry(cls, cls === 'tiktok' ? 'tiktok' : 'chat',
          `<span class="${userCls}">${esc(msg.username)}</span>: ${esc(msg.text)}`);
        break;
    }

    // Update meta effects
    if (msg.doublePoints !== undefined) {
      const el = document.getElementById('s-double');
      el.textContent = msg.doublePoints ? 'ACTIVE' : 'Off';
      el.className = 'stat-value ' + (msg.doublePoints ? 'green' : '');
    }
    if (msg.halveCosts !== undefined) {
      const el = document.getElementById('s-halved');
      el.textContent = msg.halveCosts ? 'ACTIVE' : 'Off';
      el.className = 'stat-value ' + (msg.halveCosts ? 'cyan' : '');
    }
  }

  function updateStats(msg) {
    if (msg.twitchConnected !== undefined) {
      const el = document.getElementById('s-twitch');
      el.textContent = msg.twitchConnected ? 'Connected' : 'Offline';
      el.className = 'stat-value ' + (msg.twitchConnected ? 'green' : 'red');
    }
    if (msg.activeViewers !== undefined) {
      document.getElementById('s-viewers').textContent = msg.activeViewers;
    }
  }

  function updateLeaderboard(lb) {
    const el = document.getElementById('leaderboard');
    if (!lb.length) return;
    el.innerHTML = lb.slice(0, 5).map((e, i) =>
      `<div class="lb-row">
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${esc(e.username)}</span>
        <span class="lb-pts">${e.points}pts</span>
      </div>`
    ).join('');
  }

  // ── Log ───────────────────────────────────────────────────────────────────
  function addEntry(type, badge, html) {
    const entry = { type, badge, html, time: now() };
    entries.push(entry);
    if (entries.length > 500) entries.shift();
    if (!paused) renderEntry(entry);
  }

  function renderEntry(entry) {
    if (activeFilter !== 'all' && entry.type !== activeFilter) return;
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.className = `log-entry ${entry.type}`;
    div.innerHTML = `
      <span class="log-time">${entry.time}</span>
      <span class="log-badge badge-${entry.badge}">${entry.badge}</span>
      <span class="log-body">${entry.html}</span>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    // Keep max 200 DOM entries
    while (log.children.length > 200) log.removeChild(log.firstChild);
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Re-render
    const log = document.getElementById('log');
    log.innerHTML = '';
    entries.filter(e => f === 'all' || e.type === f)
           .slice(-100)
           .forEach(renderEntry);
  }

  function clearLog() { entries = []; document.getElementById('log').innerHTML = ''; }

  function togglePause() {
    paused = !paused;
    const btn = document.getElementById('pause-btn');
    btn.textContent = paused ? 'Resume' : 'Pause';
    btn.style.borderColor = paused ? 'var(--red)' : '';
    btn.style.color = paused ? 'var(--red)' : '';
    if (!paused) {
      const log = document.getElementById('log');
      log.innerHTML = '';
      entries.filter(e => activeFilter === 'all' || e.type === activeFilter)
             .slice(-100).forEach(renderEntry);
    }
  }

  // ── Inject ────────────────────────────────────────────────────────────────
  function injectRaid(viewerCount) {
    const user = document.getElementById('raid-user').value || 'testraid';
    sendRaid(user, viewerCount);
  }

  function injectRaidCustom() {
    const user  = document.getElementById('raid-user').value || 'testraid';
    const count = parseInt(document.getElementById('raid-count').value) || 5;
    sendRaid(user, count);
  }

  function sendRaid(user, viewerCount) {
    // Raids are triggered via the overlay WebSocket — send a fake raid message
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'debug_raid',
        username: user,
        viewerCount: viewerCount
      }));
      stats.events++;
      document.getElementById('s-events').textContent = stats.events;
      addEntry('raid', 'raid',
        `<span class="user">${esc(user)}</span> raided with <span class="pts">${viewerCount} viewers</span> (injected)`);
    } else {
      addEntry('system', 'system', '⚠️ Not connected to overlay server');
    }
  }

  function injectTwitchChat() {
    const user = document.getElementById('tw-user').value || 'testviewer';
    const msg  = document.getElementById('tw-msg').value || 'test';
    // Log it locally — actual Twitch chat injection isn't possible from browser
    addEntry('twitch', 'chat',
      `<span class="user">${esc(user)}</span>: ${esc(msg)} <span style="color:var(--muted)">(simulated)</span>`);
  }

  function sendTT(payload) {
    if (ttWs && ttWs.readyState === WebSocket.OPEN) {
      ttWs.send(JSON.stringify(payload));
      stats.events++;
      document.getElementById('s-events').textContent = stats.events;
    } else {
      addEntry('system', 'system', '⚠️ TikTok test socket not connected');
    }
  }

  function injectTT(type) {
    const user = document.getElementById('tt-user').value || 'testviewer';
    sendTT({ event: type, data: { uniqueId: user, nickname: user, comment: 'test', likeCount: 1 } });
    addEntry('tiktok', 'tiktok', `<span class="tiktok-user">${esc(user)}</span> → ${type} (injected)`);
  }

  function injectGift() {
    const user     = document.getElementById('tt-user').value || 'testviewer';
    const name     = document.getElementById('tt-gift-name').value || 'Rose';
    const diamonds = parseInt(document.getElementById('tt-gift-diamonds').value) || 1;
    quickGift(name, diamonds, user);
  }

  function quickGift(name, diamonds, user) {
    user = user || document.getElementById('tt-user').value || 'testviewer';
    sendTT({
      event: 'gift',
      data: {
        uniqueId: user, nickname: user,
        giftName: name, giftId: 9999, giftType: 2,
        repeatCount: 1, repeatEnd: true,
        extendedGiftInfo: { diamond_count: diamonds }
      }
    });
    addEntry('tiktok', 'tiktok',
      `<span class="tiktok-user">${esc(user)}</span> → gift: <span class="cmd">${esc(name)}</span> (${diamonds}💎)`);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(connected) {
    document.getElementById('dot').className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
    document.getElementById('status-label').textContent = connected
      ? `Connected — ws://localhost:${PORT}/`
      : 'Disconnected — retrying...';
  }

  function now() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  connect();
  connectTT();
</script>
