<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Shop — Twitch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap');

  :root {
    --purple: #9146ff;
    --cyan:   #00f2ea;
    --dark:   #0d0d14;
    --card:   #161620;
    --border: #222233;
    --text:   #f0f0f5;
    --muted:  #6a6a88;
    --green:  #3ddc84;
    --red:    #ff2d55;
    --gold:   #ffd700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    min-height: 587px;
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 28px;
    background: linear-gradient(90deg, rgba(145,70,255,0.2), rgba(0,242,234,0.06));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header svg { width: 28px; height: 28px; flex-shrink: 0; }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #fff, var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    margin-left: auto;
    font-size: 13px;
    color: var(--muted);
  }

  .content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .content-inner {
    padding: 14px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: autoscroll 40s linear infinite;
  }

  @keyframes autoscroll {
    0%   { transform: translateY(0); }
    40%  { transform: translateY(-60%); }
    50%  { transform: translateY(-60%); }
    90%  { transform: translateY(0); }
    100% { transform: translateY(0); }
  }

  .section {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0 2px;
  }

  .shop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .shop-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    border-left: 3px solid transparent;
  }

  .shop-card.nuisance    { border-left-color: #778899; }
  .shop-card.disruptive  { border-left-color: #f0a500; }
  .shop-card.painful     { border-left-color: #ff6b35; }
  .shop-card.devastating { border-left-color: var(--red); }
  .shop-card.blessing    { border-left-color: var(--cyan); }
  .shop-card.tool        { border-left-color: var(--purple); }

  .shop-card.on-cooldown { opacity: 0.4; }

  .card-cmd {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--green);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-cost {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .cd-txt {
    font-size: 13px;
    font-weight: 700;
    color: var(--red);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 28px;
    border-top: 1px solid var(--border);
    background: rgba(145,70,255,0.08);
    flex-shrink: 0;
  }

  .footer-text { font-size: 13px; color: var(--muted); }
  .footer-cmd  {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--purple);
  }
</style>
</head>
<body>

  <div class="header">
    <!-- Twitch glitch logo -->
    <svg viewBox="0 0 24 24" fill="#9146ff">
      <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
    </svg>
    <div class="header-title">CHAOS SHOP</div>
    <div class="header-sub">Use !buy &lt;command&gt; in Twitch chat</div>
  </div>

  <div class="content"><div class="content-inner" id="content">
    <div class="section">Connecting...</div>
  </div></div>

  <div class="footer">
    <div class="footer-text">Check your balance →</div>
    <div class="footer-cmd">!balance</div>
    <div class="footer-text">· Browse all →</div>
    <div class="footer-cmd">!shop</div>
    <div class="footer-text">· Details →</div>
    <div class="footer-cmd">!info &lt;command&gt;</div>
  </div>

<script>
const WS_PORT = new URLSearchParams(location.search).get('port') || location.port || '7373';
let shop = [], cdInterval = null;

const BLESSINGS = new Set([
  'sunny','restoreenergy','restorehealth','speedboost',
  'givegold','watercrops','fertilize','cleardebris'
]);

const TIERS = [
  { label: '💀 Nuisance',    cls: 'nuisance',    min: 0,   max: 100,   blessingOnly: false },
  { label: '😈 Disruptive',  cls: 'disruptive',  min: 101, max: 250,   blessingOnly: false },
  { label: '💥 Painful',     cls: 'painful',     min: 251, max: 400,   blessingOnly: false },
  { label: '☠️ Devastating', cls: 'devastating', min: 401, max: 99999, blessingOnly: false },
  { label: '🌟 Blessings',   cls: 'blessing',    min: 0,   max: 99999, blessingOnly: true  },
];

function connect() {
  const ws = new WebSocket(`ws://localhost:${WS_PORT}/`);
  ws.onclose = () => setTimeout(connect, 3000);
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(_){} };
}

function handle(msg) {
  if (msg.type === 'init') {
    shop = msg.shop || []; render(); startCdTick();
  } else if (msg.type === 'shop_update') {
    (msg.shop || []).forEach(u => {
      const item = shop.find(s => s.buyCommand === u.buyCommand);
      if (item) {
        item.onCooldown = u.onCooldown;
        item.cooldownRemaining = u.cooldownRemaining;
        item.cooldownTotal = u.cooldownTotal || item.cooldownTotal;
      }
    });
    render();
  }
}

function render() {
  const content = document.getElementById('content');
  let html = '';
  TIERS.forEach(tier => {
    const items = shop.filter(i => {
      const isBlessing = BLESSINGS.has(i.buyCommand);
      if (tier.blessingOnly) return isBlessing;
      return !isBlessing && i.cost >= tier.min && i.cost <= tier.max;
    });
    if (!items.length) return;
    html += `<div class="section">${tier.label}</div><div class="shop-grid">`;
    items.forEach(i => {
      const right = i.onCooldown
        ? `<div class="cd-txt" id="ct-${esc(i.buyCommand)}">${i.cooldownRemaining}s</div>`
        : `<div class="card-cost">${i.cost}pts</div>`;
      html += `<div class="shop-card ${tier.cls}${i.onCooldown ? ' on-cooldown' : ''}">
        <div class="card-cmd">!buy ${esc(i.buyCommand)}</div>
        ${right}
      </div>`;
    });
    html += `</div>`;
  });
  content.innerHTML = html || '<div class="section">No sabotages loaded.</div>';
}

function startCdTick() {
  if (cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    let rerender = false;
    shop.forEach(i => {
      if (!i.onCooldown || i.cooldownRemaining <= 0) return;
      i.cooldownRemaining--;
      if (i.cooldownRemaining <= 0) { i.onCooldown = false; rerender = true; }
      else {
        const el = document.getElementById('ct-' + i.buyCommand);
        if (el) el.textContent = i.cooldownRemaining + 's';
      }
    });
    if (rerender) render();
  }, 1000);
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

connect();
</script>
</body>
</html>
