<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat vs Streamer Overlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body.theme-stardew {
  --bg: #3d2b1f; --surface: #5c3d2e; --border: #8b5e3c;
  --text: #f5e6c8; --muted: #d4b896; --accent: #f0c040;
  --green: #7abf4e; --red: #e74c3c; --blue: #2980b9; --gold: #f0c040;
}
body.theme-dark {
  --bg: #0e0e10; --surface: #18181b; --border: #3a3a3d;
  --text: #efeff1; --muted: #adadb8; --accent: #9147ff;
  --green: #00c853; --red: #f44336; --blue: #2196f3; --gold: #ffd700;
}
body.theme-light {
  --bg: #f0f0f0; --surface: #ffffff; --border: #cccccc;
  --text: #1a1a1a; --muted: #555555; --accent: #1db954;
  --green: #1db954; --red: #e53935; --blue: #1976d2; --gold: #f9a825;
}
body.theme-custom {
  --bg: var(--custom-bg, #1a1a2e);
  --surface: color-mix(in srgb, var(--custom-bg,#1a1a2e) 70%, white);
  --border: color-mix(in srgb, var(--custom-accent,#9147ff) 40%, transparent);
  --text: var(--custom-text, #efeff1);
  --muted: color-mix(in srgb, var(--custom-text,#efeff1) 60%, transparent);
  --accent: var(--custom-accent, #9147ff);
  --green: #00c853; --red: #f44336; --blue: #2196f3; --gold: var(--custom-accent,#9147ff);
}

body { background: transparent; font-family: 'Press Start 2P', monospace; color: var(--text); font-size: 8px; }

/* SIDEBAR */
#sidebar { display: none; flex-direction: column; gap: 8px; padding: 8px; }
body.mode-sidebar #sidebar { display: flex; }

.panel { background: var(--bg); border: 3px solid var(--border); box-shadow: inset 2px 2px 0 var(--surface), inset -2px -2px 0 rgba(0,0,0,0.4), 3px 3px 0 rgba(0,0,0,0.5); padding: 8px; }
.panel-title { font-size: 7px; color: var(--accent); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 6px; }
.shop-list, .feed-list, .lb-list { display: flex; flex-direction: column; gap: 4px; }
.shop-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 2px solid var(--border); padding: 5px 6px; transition: opacity 0.3s; }
.shop-item.on-cooldown { opacity: 0.45; }
.shop-item-left { display: flex; flex-direction: column; gap: 3px; }
.shop-item-name { font-size: 7px; color: var(--text); }
.shop-item-cmd  { font-size: 6px; color: var(--green); }
.shop-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.shop-item-cost { font-size: 7px; color: var(--accent); }
.cd-bar-wrap { width: 60px; height: 4px; background: var(--bg); border: 1px solid var(--border); overflow: hidden; }
.cd-bar { height: 100%; background: var(--red); transition: width 1s linear; }
.cd-txt  { font-size: 5px; color: var(--red); }
.feed-item { background: var(--surface); border: 2px solid var(--border); border-left: 4px solid var(--green); padding: 5px 6px; animation: slideIn 0.3s ease; }
.feed-item.raid { border-left-color: var(--gold); }
.feed-item.bits { border-left-color: var(--blue); }
.feed-item.meta { border-left-color: var(--accent); }
@keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.feed-username { color: var(--green); font-size: 7px; margin-bottom: 2px; }
.feed-action   { color: var(--muted); font-size: 6px; line-height: 1.4; }
.lb-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; background: var(--surface); border: 2px solid var(--border); }
.lb-rank { font-size: 6px; color: var(--muted); width: 14px; flex-shrink: 0; }
.lb-rank.gold   { color: var(--gold); }
.lb-rank.silver { color: #b0b0b0; }
.lb-rank.bronze { color: #cd7f32; }
.lb-name { font-size: 6px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-pts  { font-size: 6px; color: var(--accent); flex-shrink: 0; }
.meta-panel { display: flex; flex-direction: column; gap: 4px; }
.meta-item { background: var(--surface); border: 2px solid var(--accent); padding: 5px 8px; display: flex; justify-content: space-between; align-items: center; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.meta-label { font-size: 6px; color: var(--accent); }
.meta-timer { font-size: 6px; color: var(--text); }

/* TICKER */
#ticker { display: none; width: 100vw; height: 36px; background: var(--bg); border-top: 2px solid var(--border); border-bottom: 2px solid var(--border); overflow: hidden; position: relative; }
body.mode-ticker #ticker { display: flex; align-items: center; }
body.mode-ticker.ticker-top    #ticker { position: fixed; top: 0; left: 0; }
body.mode-ticker.ticker-bottom #ticker { position: fixed; bottom: 0; left: 0; }
#ticker-track { display: flex; align-items: center; white-space: nowrap; animation: ticker linear infinite; }
@keyframes ticker { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
body.ticker-slow   #ticker-track { animation-duration: 120s; }
body.ticker-medium #ticker-track { animation-duration: 70s; }
body.ticker-fast   #ticker-track { animation-duration: 35s; }
.ticker-item { display: inline-flex; align-items: center; gap: 6px; padding: 0 20px; font-size: 8px; color: var(--text); border-right: 1px solid var(--border); }
.ticker-item.buy  { color: var(--accent); }
.ticker-item.raid { color: var(--gold); }
.ticker-item.meta { color: var(--green); }

/* STATUS & SETTINGS */
.status { position: fixed; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: var(--red); border: 2px solid var(--bg); transition: background 0.3s; z-index: 999; }
.status.connected { background: var(--green); }
#settings-btn { position: fixed; top: 4px; right: 20px; font-size: 10px; cursor: pointer; z-index: 999; color: var(--muted); background: none; border: none; font-family: inherit; opacity: 0.4; transition: opacity 0.2s; }
#settings-btn:hover { opacity: 1; }
#settings-panel { position: fixed; top: 0; right: -260px; width: 250px; height: 100vh; background: var(--bg); border-left: 2px solid var(--border); padding: 12px; overflow-y: auto; z-index: 1000; transition: right 0.3s; font-size: 7px; }
#settings-panel.open { right: 0; }
.settings-title { color: var(--accent); font-size: 8px; margin-bottom: 12px; }
.settings-row { margin-bottom: 10px; }
.settings-row label { display: block; color: var(--muted); margin-bottom: 4px; }
.settings-row select, .settings-row input[type=text], .settings-row input[type=number] { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px; font-family: inherit; font-size: 7px; }
.settings-btn-row { display: flex; gap: 6px; margin-top: 12px; }
.settings-apply { flex: 1; background: var(--accent); color: var(--bg); border: none; padding: 6px; font-family: inherit; font-size: 7px; cursor: pointer; }
.settings-close { flex: 1; background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 6px; font-family: inherit; font-size: 7px; cursor: pointer; }
</style>
</head>
<body class="theme-stardew mode-sidebar ticker-medium ticker-bottom">

<div class="status" id="status"></div>
<button id="settings-btn" onclick="toggleSettings()">⚙</button>

<div id="sidebar">
  <div id="panel-shop" class="panel">
    <div class="panel-title">🛒 CHAOS SHOP</div>
    <div class="shop-list" id="shop-list"><div style="color:var(--muted)">Connecting...</div></div>
  </div>
  <div id="panel-feed" class="panel">
    <div class="panel-title">💥 RECENT CHAOS</div>
    <div class="feed-list" id="feed-list"><div style="color:var(--muted)">Waiting...</div></div>
  </div>
  <div id="panel-leaderboard" class="panel">
    <div class="panel-title">🏆 TOP SABOTEURS</div>
    <div class="lb-list" id="lb-list"><div style="color:var(--muted)">No data yet...</div></div>
  </div>
  <div id="panel-meta" class="panel" style="display:none">
    <div class="panel-title">🌟 ACTIVE EFFECTS</div>
    <div class="meta-panel" id="meta-list"></div>
  </div>
</div>

<div id="ticker">
  <div id="ticker-track"><span class="ticker-item">🛒 Connecting to chaos...</span></div>
</div>

<div id="settings-panel">
  <div class="settings-title">⚙ OVERLAY SETTINGS</div>
  <div class="settings-row"><label>Mode</label>
    <select id="s-mode"><option value="Sidebar">Sidebar</option><option value="Ticker">Ticker</option></select></div>
  <div class="settings-row"><label>Theme</label>
    <select id="s-theme"><option value="Stardew">Stardew</option><option value="Dark">Dark</option><option value="Light">Light</option><option value="Custom">Custom</option></select></div>
  <div class="settings-row"><label>Width (sidebar px)</label><input type="number" id="s-width" value="280" min="200" max="500"></div>
  <div class="settings-row"><label>Font Size</label><input type="number" id="s-fontsize" value="8" min="6" max="16"></div>
  <div class="settings-row"><label>Ticker Position</label>
    <select id="s-ticker-pos"><option value="Bottom">Bottom</option><option value="Top">Top</option></select></div>
  <div class="settings-row"><label>Ticker Speed</label>
    <select id="s-ticker-speed"><option value="Slow">Slow</option><option value="Medium">Medium</option><option value="Fast">Fast</option></select></div>
  <div class="settings-row">
    <label><input type="checkbox" id="s-show-shop" checked> Show Shop</label>
    <label><input type="checkbox" id="s-show-feed" checked> Show Feed</label>
    <label><input type="checkbox" id="s-show-lb" checked> Show Leaderboard</label>
    <label><input type="checkbox" id="s-show-meta" checked> Show Meta Effects</label>
  </div>
  <div class="settings-row"><label>Max Shop Items</label><input type="number" id="s-max-shop" value="8" min="1" max="30"></div>
  <div class="settings-row"><label>Max Feed Items</label><input type="number" id="s-max-feed" value="5" min="1" max="20"></div>
  <div class="settings-row"><label>Panel Order</label><input type="text" id="s-order" value="shop,feed,leaderboard"></div>
  <div class="settings-row" id="custom-colors" style="display:none">
    <label>Custom BG</label><input type="text" id="s-custom-bg" value="#1a1a2e">
    <label>Custom Accent</label><input type="text" id="s-custom-accent" value="#9147ff">
    <label>Custom Text</label><input type="text" id="s-custom-text" value="#efeff1">
  </div>
  <div class="settings-btn-row">
    <button class="settings-apply" onclick="applySettings()">Apply</button>
    <button class="settings-close" onclick="toggleSettings()">Close</button>
  </div>
</div>

<script>
const WS_PORT = location.port || 7373;
let shop=[], feed=[], leaderboard=[], metaEffects={doublePoints:false,halveCosts:false,dpSecs:0,hcSecs:0};
let cdInterval=null, metaInterval=null;
let cfg = loadLocal();

applyConfig(cfg);

// URL param overrides
const params = new URLSearchParams(location.search);
['mode','theme','width','fontSize','tickerPosition','tickerSpeed'].forEach(k => {
  if (params.has(k)) { cfg[k] = params.get(k); applyConfig(cfg); }
});

function connect() {
  const ws = new WebSocket(`ws://localhost:${WS_PORT}/`);
  ws.onopen  = () => document.getElementById('status').classList.add('connected');
  ws.onclose = () => { document.getElementById('status').classList.remove('connected'); setTimeout(connect,3000); };
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(_){} };
}

function handle(msg) {
  if (msg.type==='init') {
    shop = msg.shop || [];
    if (msg.config) mergeServerCfg(msg.config);
    renderShop(); startCdTick(); renderTicker();
  } else if (msg.type==='config') {
    if (msg.config) mergeServerCfg(msg.config);
  } else if (msg.type==='shop_update') {
    (msg.shop||[]).forEach(u => { const i=shop.find(s=>s.buyCommand===u.buyCommand); if(i){i.onCooldown=u.onCooldown;i.cooldownRemaining=u.cooldownRemaining;i.cooldownTotal=u.cooldownTotal||i.cooldownTotal;} });
    renderShop(); renderTicker();
  } else if (msg.type==='feed') {
    feed.unshift(msg); if(feed.length>cfg.maxFeedItems) feed.pop();
    renderFeed(); renderTicker();
  } else if (msg.type==='leaderboard') {
    leaderboard = msg.entries||[]; renderLeaderboard();
  } else if (msg.type==='meta') {
    metaEffects = {doublePoints:msg.doublePoints,halveCosts:msg.halveCosts,dpSecs:msg.doublePointsSecondsLeft,hcSecs:msg.halveCostsSecondsLeft};
    renderMeta();
  }
}

function mergeServerCfg(c) {
  Object.keys(c).forEach(k => { if (c[k]!==undefined) cfg[k]=c[k]; });
  applyConfig(cfg);
}

function applyConfig(c) {
  const b = document.body;
  b.classList.toggle('mode-sidebar', c.mode!=='Ticker');
  b.classList.toggle('mode-ticker',  c.mode==='Ticker');
  b.className = b.className.replace(/theme-\w+/,''); b.classList.add('theme-'+(c.theme||'Stardew').toLowerCase());
  b.classList.toggle('ticker-top',    c.tickerPosition==='Top');
  b.classList.toggle('ticker-bottom', c.tickerPosition!=='Top');
  b.classList.remove('ticker-slow','ticker-medium','ticker-fast');
  b.classList.add('ticker-'+((c.tickerSpeed||'Medium').toLowerCase()));
  document.getElementById('sidebar').style.width = (c.width||280)+'px';
  b.style.fontSize = (c.fontSize||8)+'px';
  if (c.theme==='Custom') {
    b.style.setProperty('--custom-bg',     c.customBg||'#1a1a2e');
    b.style.setProperty('--custom-accent', c.customAccent||'#9147ff');
    b.style.setProperty('--custom-text',   c.customText||'#efeff1');
    document.getElementById('custom-colors').style.display='';
  } else { document.getElementById('custom-colors').style.display='none'; }
  const vis = (id, show) => { const el=document.getElementById(id); if(el) el.style.display=show?'':'none'; };
  vis('panel-shop',        c.showShop!==false);
  vis('panel-feed',        c.showFeed!==false);
  vis('panel-leaderboard', c.showLeaderboard!==false);
  if (c.panelOrder) {
    const sb = document.getElementById('sidebar');
    c.panelOrder.split(',').map(s=>s.trim()).forEach(name => { const el=document.getElementById('panel-'+name); if(el) sb.appendChild(el); });
    sb.appendChild(document.getElementById('panel-meta'));
  }
  syncSettingsUI(c);
}

function renderShop() {
  const list=document.getElementById('shop-list'), items=shop.slice(0,cfg.maxShopItems||8);
  if(!items.length){list.innerHTML='<div style="color:var(--muted)">No sabotages</div>';return;}
  list.innerHTML=items.map(i=>`<div class="shop-item ${i.onCooldown?'on-cooldown':''}" id="shop-${i.buyCommand}">
    <div class="shop-item-left"><div class="shop-item-name">${esc(i.name)}</div><div class="shop-item-cmd">!buy ${esc(i.buyCommand)}</div></div>
    <div class="shop-item-right"><div class="shop-item-cost">${i.cost}pts</div>
    ${i.onCooldown?`<div class="cd-bar-wrap"><div class="cd-bar" id="cd-${i.buyCommand}" style="width:${pct(i.cooldownRemaining,i.cooldownTotal)}%"></div></div><div class="cd-txt" id="ct-${i.buyCommand}">${i.cooldownRemaining}s</div>`:''}</div></div>`).join('');
}

function startCdTick() {
  if(cdInterval) clearInterval(cdInterval);
  cdInterval=setInterval(()=>{
    let r=false;
    shop.forEach(i=>{
      if(!i.onCooldown||i.cooldownRemaining<=0)return;
      i.cooldownRemaining--;
      if(i.cooldownRemaining<=0){i.onCooldown=false;r=true;}
      else{const b=document.getElementById('cd-'+i.buyCommand),t=document.getElementById('ct-'+i.buyCommand);if(b)b.style.width=pct(i.cooldownRemaining,i.cooldownTotal)+'%';if(t)t.textContent=i.cooldownRemaining+'s';}
    });
    if(r){renderShop();renderTicker();}
  },1000);
}

function renderFeed() {
  const list=document.getElementById('feed-list');
  if(!feed.length){list.innerHTML='<div style="color:var(--muted)">Waiting...</div>';return;}
  list.innerHTML=feed.slice(0,cfg.maxFeedItems||5).map(i=>`<div class="feed-item ${esc(i.eventType||'')}"><div class="feed-username">${esc(i.username)}</div><div class="feed-action">${esc(i.description)}${i.cost>0?` (${i.cost}pts)`:''}</div></div>`).join('');
}

function renderLeaderboard() {
  const list=document.getElementById('lb-list');
  if(!leaderboard.length){list.innerHTML='<div style="color:var(--muted)">No data yet</div>';return;}
  list.innerHTML=leaderboard.slice(0,cfg.maxLeaderboardItems||5).map((e,i)=>`<div class="lb-item"><div class="lb-rank ${['gold','silver','bronze','',''][i]}">${['#1','#2','#3','#4','#5'][i]}</div><div class="lb-name">${esc(e.Username)}</div><div class="lb-pts">${e.Points}pts</div></div>`).join('');
}

function renderMeta() {
  const panel=document.getElementById('panel-meta'), list=document.getElementById('meta-list');
  const items=[];
  if(metaEffects.doublePoints) items.push({label:'🌟 DOUBLE POINTS',secs:metaEffects.dpSecs});
  if(metaEffects.halveCosts)   items.push({label:'🔽 COSTS HALVED', secs:metaEffects.hcSecs});
  panel.style.display=(cfg.showMetaEffects!==false&&items.length)?'':'none';
  list.innerHTML=items.map(i=>`<div class="meta-item"><div class="meta-label">${i.label}</div><div class="meta-timer">${i.secs}s</div></div>`).join('');
  if(metaInterval) clearInterval(metaInterval);
  if(items.length) metaInterval=setInterval(()=>{
    if(metaEffects.dpSecs>0)metaEffects.dpSecs--;
    if(metaEffects.hcSecs>0)metaEffects.hcSecs--;
    if(metaEffects.dpSecs<=0)metaEffects.doublePoints=false;
    if(metaEffects.hcSecs<=0)metaEffects.halveCosts=false;
    renderMeta();
  },1000);
}

function renderTicker() {
  if(cfg.mode!=='Ticker') return;
  const track=document.getElementById('ticker-track');
  const parts=[];
  shop.slice(0,cfg.maxShopItems||20).forEach(i=>{ const cd=i.onCooldown?` ⏳${i.cooldownRemaining}s`:''; parts.push(`<span class="ticker-item">🛒 !buy ${esc(i.buyCommand)} — ${i.cost}pts${cd}</span>`); });
  feed.slice(0,3).forEach(i=>parts.push(`<span class="ticker-item ${esc(i.eventType||'')}">💥 ${esc(i.username)}: ${esc(i.description)}</span>`));
  if(metaEffects.doublePoints) parts.push(`<span class="ticker-item meta">🌟 DOUBLE POINTS — ${metaEffects.dpSecs}s</span>`);
  if(metaEffects.halveCosts)   parts.push(`<span class="ticker-item meta">🔽 COSTS HALVED — ${metaEffects.hcSecs}s</span>`);
  track.innerHTML=parts.join('<span style="color:var(--border);padding:0 8px">•</span>')||'<span class="ticker-item">🛒 Connecting...</span>';
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

function syncSettingsUI(c) {
  const g=id=>document.getElementById(id);
  g('s-mode').value=c.mode||'Sidebar'; g('s-theme').value=c.theme||'Stardew';
  g('s-width').value=c.width||280; g('s-fontsize').value=c.fontSize||8;
  g('s-ticker-pos').value=c.tickerPosition||'Bottom'; g('s-ticker-speed').value=c.tickerSpeed||'Medium';
  g('s-show-shop').checked=c.showShop!==false; g('s-show-feed').checked=c.showFeed!==false;
  g('s-show-lb').checked=c.showLeaderboard!==false; g('s-show-meta').checked=c.showMetaEffects!==false;
  g('s-max-shop').value=c.maxShopItems||8; g('s-max-feed').value=c.maxFeedItems||5;
  g('s-order').value=c.panelOrder||'shop,feed,leaderboard';
  g('s-custom-bg').value=c.customBg||'#1a1a2e'; g('s-custom-accent').value=c.customAccent||'#9147ff'; g('s-custom-text').value=c.customText||'#efeff1';
}

function applySettings() {
  const g=id=>document.getElementById(id);
  Object.assign(cfg,{
    mode:g('s-mode').value, theme:g('s-theme').value,
    width:parseInt(g('s-width').value), fontSize:parseInt(g('s-fontsize').value),
    tickerPosition:g('s-ticker-pos').value, tickerSpeed:g('s-ticker-speed').value,
    showShop:g('s-show-shop').checked, showFeed:g('s-show-feed').checked,
    showLeaderboard:g('s-show-lb').checked, showMetaEffects:g('s-show-meta').checked,
    maxShopItems:parseInt(g('s-max-shop').value), maxFeedItems:parseInt(g('s-max-feed').value),
    panelOrder:g('s-order').value,
    customBg:g('s-custom-bg').value, customAccent:g('s-custom-accent').value, customText:g('s-custom-text').value,
  });
  applyConfig(cfg); saveLocal(cfg);
  renderShop(); renderFeed(); renderLeaderboard(); renderMeta(); renderTicker();
  toggleSettings();
}

function loadLocal() { try { return JSON.parse(localStorage.getItem('cvs-overlay')||'{}'); } catch{return{};} }
function saveLocal(c) { try { localStorage.setItem('cvs-overlay',JSON.stringify(c)); } catch{} }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pct(r,t) { return t>0?Math.max(0,Math.min(100,Math.round(r/t*100))):0; }

connect();
</script>
</body>
</html>
