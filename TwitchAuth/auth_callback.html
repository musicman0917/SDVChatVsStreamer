<!DOCTYPE html>
<html>
<head>
  <title>Authorizing — Neighborhood of Cards</title>
  <style>
    body { font-family: sans-serif; background: #0e0e10; color: #efeff1; text-align: center; padding: 80px 20px; }
    h2   { color: #9147ff; font-size: 28px; margin-bottom: 12px; }
    p    { color: #adadb8; font-size: 16px; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #9147ff33;
               border-top-color: #9147ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>🟣 Neighborhood of Cards</h2>
  <div class='spinner'></div>
  <p>Receiving authorization from Twitch...</p>
  <script>
    try {
      var hash   = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var token  = params.get('access_token');
      var state  = params.get('state') || '';
      if (token) {
        window.location.href = '/token?access_token=' + encodeURIComponent(token) + '&state=' + encodeURIComponent(state);
      } else {
        document.querySelector('p').textContent = 'Error: No token in URL. Please try again.';
        document.querySelector('.spinner').style.display = 'none';
      }
    } catch(e) {
      document.querySelector('p').textContent = 'Error: ' + e.message;
    }
  </script>
</body>
</html>
